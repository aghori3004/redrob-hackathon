# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for architectural discussion, implementation,
  code review, and writing the local evaluation harness. All design decisions
  (scoring components, the embedding A/B test, weights) were driven by local
  evaluation metrics. No candidate data was sent to any hosted LLM — the
  ranking pipeline runs fully offline (rules + a local ONNX MiniLM model).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Interpretable rules-first ranker, refined by a small embedding blend.
  A streaming pass applies honeypot consistency checks (expert-skill-vs-duration,
  stated-vs-summed experience, impossible dates) and a recall-oriented relevance
  gate, then scores survivors on six JD-fit components — core IR relevance
  (graded by depth across learning-to-rank / ranking / recommendation / retrieval /
  ranking-eval / vector-search), product-company experience, years-of-experience
  fit (5-9y), location/notice logistics, education, and external validation —
  combined with multiplicative JD-severity disqualifier penalties (consulting-only,
  research-only, LLM-wrapper, CV/speech-only, non-coding senior, geo-ineligible,
  title-chaser) and a behavioral availability multiplier. The skills array is
  treated as noise (uniform in this dataset) and used only for honeypot detection.
  An A/B test on a 200-candidate hand-labeled set showed a MiniLM JD-cosine
  feature, blended at weight 0.10, lifts the contest composite 0.84 -> 0.89
  (NDCG@10 0.80 -> 0.87), so it was adopted; the model runs locally (ONNX, CPU,
  offline). Per-candidate reasoning is generated only from fields the scorer read.
  Full 100K run: ~140s, CPU, no network.

